<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>FORGE 3D — Integrated Controller</title>
  <style>
    body { margin: 0; background: #0f1117; overflow: hidden; }
    canvas { display: block; }
    /* Touch UI Styles */
    #touch-ui { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index: 100; }
    #joy-zone { position: fixed; bottom: 30px; left: 30px; width: 130px; height: 130px; pointer-events: auto; }
    #joy-base { width: 130px; height: 130px; border-radius: 50%; background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.15); backdrop-filter: blur(10px); }
    #joy-knob { position: absolute; width: 50px; height: 50px; border-radius: 50%; background: rgba(79,142,247,0.45); top: 50%; left: 50%; transform: translate(-50%, -50%); transition: transform 0.05s; }
  </style>
</head>
<body>
  <div id="touch-ui">
    <div id="joy-zone"><div id="joy-base"><div id="joy-knob"></div></div></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

  <script>
    // 1. Setup Scene
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);
    camera.position.set(0, 2, 5);

    // 2. Character Logic
    let character = new THREE.Mesh(new THREE.BoxGeometry(1,2,1), new THREE.MeshBasicMaterial({color: 0x4f8ef7}));
    scene.add(character);

    // 3. Joystick Logic
    let joyX = 0, joyY = 0;
    const knob = document.getElementById('joy-knob');
    document.getElementById('joy-zone').addEventListener('touchmove', (e) => {
      let t = e.touches[0];
      let rect = document.getElementById('joy-base').getBoundingClientRect();
      let dx = t.clientX - (rect.left + 65);
      let dy = t.clientY - (rect.top + 65);
      let dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
      let angle = Math.atan2(dy, dx);
      knob.style.transform = `translate(${Math.cos(angle)*dist - 25}px, ${Math.sin(angle)*dist - 25}px)`;
      joyX = dx/40; joyY = -dy/40;
    });
    document.getElementById('joy-zone').addEventListener('touchend', () => {
      knob.style.transform = 'translate(-50%, -50%)';
      joyX = 0; joyY = 0;
    });

    // 4. Loop
    function animate() {
      requestAnimationFrame(animate);
      character.position.x += joyX * 0.1;
      character.position.z -= joyY * 0.1;
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
